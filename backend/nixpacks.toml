[phases.install]
cmds = [
    "composer install --ignore-platform-reqs --no-scripts",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build",
    "composer install --no-dev --optimize-autoloader --no-scripts",
    "php artisan vendor:publish --tag=filament-assets --force"
]

[start]
cmd = "php artisan migrate --force --seed; php artisan storage:link --force; php artisan config:cache; php artisan route:cache; php artisan reverb:start --host=0.0.0.0 --port=6001 & php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"